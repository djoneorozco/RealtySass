<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login – RealtySass</title>

  <!-- Tailwind & Fonts -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Lora:wght@400;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Montserrat', sans-serif;
      background-color: #0d0d0d;
      color: #f5f5f5;
    }
    h1, h2, h3 {
      font-family: 'Lora', serif;
    }
    .glass {
      background-color: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    /* Hero Glow */
    .hero {
      position: relative;
      background-color: #0d0d0d;
      color: #fff;
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute;
      bottom: -50px;
      left: 50%;
      transform: translateX(-50%);
      width: 120%;
      height: 300px;
      background: radial-gradient(ellipse at center, rgba(212,175,55,0.35) 0%, rgba(0,0,0,0.1) 70%);
      opacity: 0.9;
      z-index: 0;
    }
    .hero > div {
      position: relative;
      z-index: 10;
    }
  </style>
</head>
<body>

  <!-- Header/Navbar -->
  <header class="glass w-full py-4 fixed z-50">
    <div class="max-w-7xl mx-auto px-6 flex justify-between items-center">
      <h1 class="text-2xl font-bold text-white">RealtySass</h1>
      <nav class="hidden md:flex space-x-6 text-gray-200">
        <a href="index.html" class="hover:text-gold">Home</a>
        <a href="products.html" class="hover:text-gold">Products</a>
        <a href="pricing.html" class="hover:text-gold">Pricing</a>
        <a href="templates.html" class="hover:text-gold">Templates</a>
        <a href="login.html" class="hover:text-gold">Login</a>
        <a href="joinus.html" class="px-4 py-2 bg-yellow-400 text-black rounded">Join Us</a>
      </nav>
    </div>
  </header>

  <!-- Hero Section -->
  <section class="hero text-center pt-36 pb-20 px-4">
    <div class="max-w-3xl mx-auto">
      <h2 class="text-4xl md:text-5xl font-bold mb-4 leading-tight">
        Log in and Take Control of Your RealtySass Toolkit
      </h2>
      <p class="text-gray-300 text-lg">
        Your dashboard, templates, and tools are just a click away.
      </p>
    </div>
  </section>

  <!-- Login Form -->
  <section class="py-16 px-4">
    <div class="max-w-md mx-auto bg-white rounded-lg shadow-lg p-8 text-gray-900">
      <h3 class="text-2xl font-bold mb-6 text-center">Sign In</h3>
      <form>
        <div class="mb-4">
          <label for="email" class="block text-sm font-medium mb-1">Email address</label>
          <input type="email" id="email" class="w-full px-4 py-2 border border-gray-300 rounded" placeholder="you@example.com" />
        </div>
        <div class="mb-6">
          <label for="password" class="block text-sm font-medium mb-1">Password</label>
          <input type="password" id="password" class="w-full px-4 py-2 border border-gray-300 rounded" placeholder="••••••••" />
        </div>
        <button type="submit" class="w-full py-2 px-4 bg-yellow-400 text-black font-semibold rounded hover:bg-yellow-300 transition">Login</button>
      </form>
      <p class="text-center text-sm text-gray-600 mt-4">
        Don't have an account? <a href="joinus.html" class="text-yellow-500 font-semibold">Join Us</a>
      </p>
    </div>
  </section>

  <!-- Footer -->
  <footer class="text-center py-10 text-sm text-gray-500 bg-[#0d0d0d]">
    &copy; 2025 RealtySass – Built with sass, style, and strategy.
  </footer>

</body>
</html>
