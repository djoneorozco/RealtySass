<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Templates – RealtySass</title>

  <!-- Tailwind & Fonts -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Lora:wght@400;700&display=swap"
    rel="stylesheet"
  >

  <!-- Swiper CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

  <style>
    body { font-family: 'Montserrat', sans-serif; background-color: #0d0d0d; margin: 0; color: #333; }
    h1,h2,h3 { font-family: 'Lora', serif; }
    .text-gold { color: #d4af37; }
    .bg-gold { background-color: #d4af37; }
    .hero { background-color: #0d0d0d; color: #fff; }
    .showcase { background-color: #fbf9f3; }
    .showcase .domain { font-size: 0.85rem; color: #888; text-transform: uppercase; margin-bottom: 0.5rem; }
    a.btn { display: inline-block; padding: 0.75rem 1.5rem; background-color: #d4af37; color: #0d0d0d; font-weight: 600; border-radius: 0.375rem; }
    .swiper { width: 100%; padding: 2rem 0; }
    .swiper-slide { border-radius: 0.5rem; overflow: hidden; background: #fff; }
    .swiper-slide img { width: 100%; height: auto; display: block; }
    .slide-caption { padding: 0.75rem; font-weight: 600; color: #1a1a1a; }
  </style>
</head>
<body>

  <!-- Navbar omitted for brevity… -->

  <main class="pt-28">

    <!-- Showcase Section omitted… -->

    <!-- Slider Section -->
    <section class="py-20 px-4 bg-white/5 text-center">
      <h3 class="text-3xl font-bold mb-6 text-gray-900">Browse More Templates</h3>
      <div class="swiper mySwiper max-w-6xl mx-auto">

        <div class="swiper-wrapper">

          <!-- Slide 1: Clean Cut -->
          <div class="swiper-slide">
            <img src="images/template1.png" alt="Clean Cut template preview">
            <div class="slide-caption">Clean Cut</div>
          </div>

          <!-- Slide 2: Modern & Techy -->
          <div class="swiper-slide">
            <img src="images/template2.png" alt="Modern & Techy template preview">
            <div class="slide-caption">Modern & Techy</div>
          </div>

          <!-- Slide 3: Zaddy (or Elegant Edge) -->
          <div class="swiper-slide">
            <img src="images/template3.png" alt="Zaddy template preview">
            <div class="slide-caption">Zaddy</div>
          </div>

          <!-- Slide 4: add more as needed -->
          <div class="swiper-slide">
            <img src="images/template4.png" alt="Another template preview">
            <div class="slide-caption">Template Four</div>
          </div>

        </div>

        <!-- controls -->
        <div class="swiper-pagination mt-4"></div>
        <div class="swiper-button-next text-gray-900"></div>
        <div class="swiper-button-prev text-gray-900"></div>

      </div>
    </section>

    <!-- Footer omitted… -->
  </main>

  <!-- Swiper JS -->
  <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
  <script>
    new Swiper(".mySwiper", {
      effect: "slide",
      grabCursor: true,
      centeredSlides: true,
      slidesPerView: 1.2,
      loop: true,
      spaceBetween: 30,
      autoplay: { delay: 4000, disableOnInteraction: false },
      pagination: { el: ".swiper-pagination", clickable: true },
      navigation: { nextEl: ".swiper-button-next", prevEl: ".swiper-button-prev" },
      breakpoints: { 768: { slidesPerView: 2.2 }, 1024: { slidesPerView: 3 } }
    });
  </script>

</body>
</html>
