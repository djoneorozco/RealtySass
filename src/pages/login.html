<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login – RealtySass</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Lora:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Montserrat', sans-serif;
      background-color: #0d0d0d;
      color: #fff;
      margin: 0;
    }
    h1, h2, h3 {
      font-family: 'Lora', serif;
    }
    .text-gold { color: #d4af37; }
    .bg-gold { background-color: #d4af37; }
    .hero {
      background-color: #0d0d0d;
      color: #fff;
      text-align: center;
      padding: 6rem 1rem;
      position: relative;
    }
    .logo-bar {
      position: relative;
    }
    .logo-bar::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 60%;
      height: 300px;
      transform: translate(-50%, -50%);
      background: radial-gradient(circle at center, rgba(212,175,55,0.4), transparent);
      z-index: 0;
    }
    .logo-bar img {
      position: relative;
      z-index: 1;
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <header class="fixed top-0 w-full bg-black bg-opacity-80 z-50 shadow-md">
    <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
      <h1 class="text-2xl font-bold text-white">RealtySass</h1>
      <nav class="hidden md:flex space-x-6 text-gray-200">
        <a href="index.html" class="hover:text-gold">Home</a>
        <a href="products.html" class="hover:text-gold">Products</a>
        <a href="pricing.html" class="hover:text-gold">Pricing</a>
        <a href="templates.html" class="hover:text-gold">Templates</a>
        <a href="login.html" class="hover:text-gold">Login</a>
        <a href="signup.html" class="px-4 py-2 bg-gold text-black rounded">Join Us</a>
      </nav>
    </div>
  </header>

  <!-- Hero Section with Login -->
  <main class="pt-28">
    <section class="hero">
      <div class="max-w-md mx-auto flex flex-col items-center justify-center">
        <div class="logo-bar mb-8">
          <img src="/src/assets/SaSS.png" alt="RealtySass Logo" class="w-32 mx-auto" />
        </div>
        <div class="bg-white text-black rounded-lg shadow-xl w-full p-8">
          <h2 class="text-2xl font-semibold mb-6 text-center">Welcome Back</h2>
          <form>
            <div class="mb-4">
              <label for="email" class="block mb-2 font-medium">Email</label>
              <input type="email" id="email" name="email" required class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-gold" />
            </div>
            <div class="mb-6">
              <label for="password" class="block mb-2 font-medium">Password</label>
              <input type="password" id="password" name="password" required class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-gold" />
            </div>
            <button type="submit" class="w-full bg-gold text-black font-semibold py-2 rounded hover:opacity-90 transition duration-200">Log In</button>
          </form>
        </div>
      </div>
    </section>
  </main>

  <!-- Footer -->
  <footer class="text-center py-10 text-sm text-gray-400">
    &copy; 2025 RealtySass – Built with sass, style, and strategy.
  </footer>

</body>
</html>
