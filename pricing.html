<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pricing – RealtySass</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Lora:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Montserrat', sans-serif;
      background-color: #0d0d0d;
      color: #f5f5f5;
    }
    h1, h2, h3 {
      font-family: 'Lora', serif;
    }
    .gold { background-color: #d4af37; color: #0d0d0d; }
    .tab-active {
      background-color: #3a3535;
      color: #fff;
      font-weight: 600;
    }
    .glass {
      background-color: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    .hero {
      position: relative;
      background-color: #0d0d0d;
      color: #fff;
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute;
      bottom: -50px;
      left: 50%;
      transform: translateX(-50%);
      width: 120%;
      height: 300px;
      background: radial-gradient(ellipse at center, rgba(212,175,55,0.35) 0%, rgba(0,0,0,0.1) 70%);
      opacity: 0.9;
      z-index: 0;
    }
    .hero > div {
      position: relative;
      z-index: 10;
    }
    #compareBtn {
      position: fixed;
      top: 50%;
      left: 0;
      transform: translateY(-50%);
      background: #d4af37;
      color: #000;
      padding: 0.75rem 1.5rem;
      border-top-right-radius: 9999px;
      border-bottom-right-radius: 9999px;
      font-weight: bold;
      cursor: pointer;
      z-index: 50;
    }
    #pricingVideo {
      position: fixed;
      top: 50%;
      left: 20px;
      transform: translateY(-50%);
      max-width: 320px;
      z-index: 40;
      opacity: 0;
      transition: opacity 0.5s ease-in-out;
    }
    #pricingVideo.show {
      opacity: 1;
    }
  </style>
</head>
<body>
  <button id="compareBtn">Compare Plans</button>
  <video id="pricingVideo" class="rounded-lg" muted>
    <source src="avatarpricing.mp4" type="video/mp4">
    Your browser does not support the video tag.
  </video>

  <!-- Existing content starts here -->
  <header class="glass w-full py-4 fixed z-50">
    <div class="max-w-7xl mx-auto px-6 flex justify-between items-center">
      <h1 class="text-2xl font-bold text-white">RealtySass</h1>
      <nav class="hidden md:flex space-x-6 text-gray-200">
        <a href="index.html" class="hover:text-gold">Home</a>
        <a href="products.html" class="hover:text-gold">Products</a>
        <a href="templates.html" class="hover:text-gold">Templates</a>
        <a href="login.html" class="hover:text-gold">Login</a>
        <a href="joinus.html" class="px-4 py-2 gold rounded">Join Us</a>
      </nav>
    </div>
  </header>

  <!-- Rest of pricing content stays the same -->

  <footer class="text-center py-10 text-sm text-gray-500 bg-[#0d0d0d]">
    &copy; 2025 RealtySass – Built with sass, style, and strategy.
  </footer>

  <script>
    document.getElementById('compareBtn').addEventListener('click', () => {
      const video = document.getElementById('pricingVideo');
      if (video.classList.contains('show')) {
        video.pause();
        video.classList.remove('show');
      } else {
        video.classList.add('show');
        video.play();
        video.onended = () => video.classList.remove('show');
      }
    });
  </script>
</body>
</html>
