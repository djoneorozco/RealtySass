<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login – RealtySass</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Lora:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body { margin: 0; font-family: 'Montserrat', sans-serif; background-color: #000; color: #fff; }
    h1, h2, h3 { font-family: 'Lora', serif; }
    .bg-gold { background-color: #d4af37; }
  </style>
</head>
<body>
  <!-- Navbar -->
  <header class="fixed top-0 w-full bg-black bg-opacity-90 backdrop-blur z-50">
    <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
      <h1 class="text-2xl font-bold text-white">RealtySass</h1>
      <nav class="hidden md:flex space-x-6 text-gray-200">
        <a href="index.html" class="hover:text-gold">Home</a>
        <a href="products.html" class="hover:text-gold">Products</a>
        <a href="pricing.html" class="hover:text-gold">Pricing</a>
        <a href="templates.html" class="hover:text-gold">Templates</a>
        <a href="login.html" class="hover:text-gold">Login</a>
        <a href="signup.html" class="px-4 py-2 bg-gold text-black rounded">Join Us</a>
      </nav>
    </div>
  </header>

  <!-- Login Card -->
  <main class="flex items-center justify-center min-h-screen pt-20 px-4">
    <div class="bg-white rounded-lg shadow-lg p-8 max-w-md w-full">
      <img src="SaSS.png" alt="RealtySass Logo" class="mx-auto mb-6 w-32 h-auto">
      <p class="text-center text-gray-600 mb-6">To get started, please sign in.</p>
      <form>
        <label for="email" class="block text-gray-800 mb-1">Email address</label>
        <input id="email" type="email" placeholder="" class="w-full border border-gray-300 rounded px-4 py-2 mb-4 focus:outline-none focus:ring-2 focus:ring-gold" required>
        <label for="password" class="block text-gray-800 mb-1">Password</label>
        <input id="password" type="password" placeholder="" class="w-full border border-gray-300 rounded px-4 py-2 mb-6 focus:outline-none focus:ring-2 focus:ring-gold" required>
        <button type="submit" class="w-full bg-black text-white py-2 rounded mb-4 hover:opacity-90">Continue</button>
      </form>
      <div class="text-center">
        <a href="#" class="text-sm text-gray-500 hover:underline">Forgot password?</a>
      </div>
      <div class="text-center mt-6">
        <a href="#" class="text-sm text-gray-400 hover:underline">Privacy Policy</a>
      </div>
    </div>
  </main>
</body>
</html>
