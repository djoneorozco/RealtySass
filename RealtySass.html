<!-- 🏡 index.html with Tease Mode Toggle -->
<!DOCTYPE html>
<html lang="en">
<head>
  <!-- #1 META + TITLE -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RealtySass – Put some SaaS in your Realty</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Lora:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
  <style>
    body {
      font-family: 'Montserrat', sans-serif;
      background: radial-gradient(circle at right, #7b5e3d, #000000);
      color: #f5f5f5;
    }
    h1, h2, h3 {
      font-family: 'Lora', serif;
    }
    .glass {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
      transition: box-shadow 0.3s ease;
    }
    .glass:hover {
      box-shadow: 0 12px 48px rgba(0, 0, 0, 0.3);
    }
    .gold {
      --tw-bg-opacity: 1;
      background-color: rgba(212,175,55,var(--tw-bg-opacity));
    }
    .hero {
      position: relative;
      background-color: #252422;
      color: #fff;
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute;
      bottom: -50px;
      left: 50%;
      transform: translateX(-50%);
      width: 120%;
      height: 300px;
      background: radial-gradient(ellipse at center, rgba(212,175,55,0.35) 0%, rgba(0,0,0,0.1) 70%);
      opacity: 0.9;
      z-index: 0;
    }
    .hero > div {
      position: relative;
      z-index: 10;
    }
    .swiper-slide img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .rotator {
      perspective: 1000px;
    }
    .rotator img {
      width: 100%;
      height: auto;
      transform-style: preserve-3d;
      animation: spin 20s linear infinite;
    }
    @keyframes spin {
      from { transform: rotateY(0deg) rotateX(0deg); }
      to   { transform: rotateY(360deg) rotateX(360deg); }
    }
  </style>
</head>

<body>
  <!-- #2 HEADER/NAV WITH TEASE MODE BUTTON -->
  <header class="w-full py-4 fixed z-50 glass">
    <div class="max-w-7xl mx-auto px-6 flex justify-between items-center">
      <h1 class="text-2xl font-bold text-white mr-auto">RealtySass</h1>
      <nav class="hidden md:flex space-x-6 items-center">
        <a href="products.html" class="text-gray-200 hover:text-gold">Products</a>
        <a href="templates.html" class="text-gray-200 hover:text-gold">Templates</a>
        <a href="pricing.html" class="text-gray-200 hover:text-gold">Pricing</a>
        <a href="login.html" class="text-gray-200 hover:text-gold">Login</a>
        <a href="joinus.html" class="px-4 py-2 gold text-gray-900 rounded-full hover:opacity-90">Join Us</a>
        <!-- Tease Mode Toggle Button -->
        <button id="teaseToggle" onclick="toggleTeaseMode()" class="ml-4 px-4 py-2 rounded-full border border-gray-300 text-gray-200 hover:text-white">
          Tease Mode: Off
        </button>
      </nav>
    </div>
  </header>

  <!-- [your existing sections remain the same] -->
  <!-- #3 HERO SECTION -->
  <!-- #4 HERO VIDEO SECTION -->
  <!-- #4.5 GRID -->
  <!-- #5 CHOOSE YOUR VIBE -->
  <!-- #6 ROTATOR PHOTO SECTION -->
  <!-- #7 FOOTER -->
  <!-- #8 OVERLAYS -->
  <!-- #9 SCRIPTS -->

  <!-- #9 SCRIPTS -->
  <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
  <script>
    const heroVideo = document.getElementById('heroVideo');
    if(heroVideo) {
      heroVideo.play().catch(() => {});
      document.addEventListener('click', () => {
        if (heroVideo.muted) {
          heroVideo.muted = false;
          heroVideo.play();
        }
      });
    }

    function toggleTeaseMode() {
      const btn = document.getElementById('teaseToggle');
      if (btn.classList.contains('bg-red-600')) {
        // Turn OFF
        btn.classList.remove('bg-red-600');
        btn.classList.add('border', 'border-gray-300', 'text-gray-200');
        btn.textContent = 'Tease Mode: Off';
      } else {
        // Turn ON
        btn.classList.remove('border', 'border-gray-300', 'text-gray-200');
        btn.classList.add('bg-red-600', 'text-white');
        btn.textContent = 'Tease Mode: On';
        // Redirect to Tease Mode page
        window.location.href = "RealtySass.html";
      }
    }
  </script>
</body>
</html>
