<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login – RealtySass</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Lora:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Montserrat', sans-serif; background-color: #0d0d0d; color: #f5f5f5; }
    h1, h2, h3 { font-family: 'Lora', serif; }
    .glass { background-color: rgba(255,255,255,0.1); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); }
    .gold { --tw-bg-opacity: 1; background-color: rgba(212,175,55,var(--tw-bg-opacity)); }
    input { width: 100%; padding: 0.5rem; margin-bottom: 1rem; border: none; border-radius: 4px; }
    button { width: 100%; padding: 0.75rem; background: #d4af37; color: black; font-weight: 600; border: none; border-radius: 4px; cursor: pointer; }
  </style>
</head>
<body>

  <!-- Header/Navbar -->
  <header class="w-full py-4 fixed z-50 glass">
    <div class="max-w-7xl mx-auto px-6 flex justify-between items-center">
      <h1 class="text-2xl font-bold text-white">RealtySass</h1>
      <nav class="hidden md:flex space-x-6">
        <a href="index.html" class="text-gray-200 hover:text-gold">Home</a>
        <a href="products.html" class="text-gray-200 hover:text-gold">Products</a>
        <a href="templates.html" class="text-gray-200 hover:text-gold">Templates</a>
        <a href="pricing.html" class="text-gray-200 hover:text-gold">Pricing</a>
        <a href="login.html" class="text-gray-200 hover:text-gold">Login</a>
        <a href="login.html#signup" class="px-4 py-2 gold text-gray-900 rounded-full hover:opacity-90">Sign Up</a>
      </nav>
    </div>
  </header>

  <main class="pt-28 px-4">
    <div class="max-w-md mx-auto space-y-12">

      <!-- Login Form -->
      <section id="login" class="glass p-8 rounded-2xl shadow-lg">
        <h2 class="text-2xl font-semibold mb-4">Log In</h2>
        <form id="loginForm">
          <input type="email" id="loginEmail" placeholder="Email" required />
          <input type="password" id="loginPassword" placeholder="Password" required />
          <button type="submit">Log In</button>
        </form>
        <p class="mt-4 text-center text-gray-400">
          Don't have an account? <a href="#signup" class="text-gold underline">Sign Up</a>
        </p>
      </section>

      <!-- Sign-Up Form -->
      <section id="signup" class="glass p-8 rounded-2xl shadow-lg">
        <h2 class="text-2xl font-semibold mb-4">Sign Up</h2>
        <form id="signupForm">
          <input type="text" id="signupName" placeholder="Full Name" required />
          <input type="email" id="signupEmail" placeholder="Email" required />
          <input type="password" id="signupPassword" placeholder="Password" required />
          <input type="password" id="signupConfirm" placeholder="Confirm Password" required />
          <button type="submit">Create Account</button>
        </form>
        <p class="mt-4 text-center text-gray-400">
          Already have an account? <a href="#login" class="text-gold underline">Log In</a>
        </p>
      </section>

    </div>
  </main>

  <!-- Footer -->
  <footer class="text-center py-10 text-sm text-gray-500">
    &copy; 2025 RealtySass – Built with sass, style, and strategy.
  </footer>

  <script>
    // Simple localStorage-based auth
    const signupForm = document.getElementById('signupForm');
    const loginForm = document.getElementById('loginForm');

    signupForm.addEventListener('submit', e => {
      e.preventDefault();
      const name = document.getElementById('signupName').value;
      const email = document.getElementById('signupEmail').value;
      const pw = document.getElementById('signupPassword').value;
      const confirm = document.getElementById('signupConfirm').value;
      if (pw !== confirm) {
        alert('Passwords do not match');
        return;
      }
      localStorage.setItem('rs_user', JSON.stringify({ name, email, pw }));
      alert('Account created! You can now log in.');
      location.hash = '#login';
    });

    loginForm.addEventListener('submit', e => {
      e.preventDefault();
      const email = document.getElementById('loginEmail').value;
      const pw = document.getElementById('loginPassword').value;
      const user = JSON.parse(localStorage.getItem('rs_user')||'null');
      if (user && user.email === email && user.pw === pw) {
        alert(`Welcome back, ${user.name}!`);
        // Redirect or show logged-in UI
      } else {
        alert('Invalid email or password');
      }
    });
  </script>

</body>
</html>
