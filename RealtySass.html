<!-- 🏡 index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <!-- //#1 META + TITLE -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RealtySass – Put some SaaS in your Realty</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Lora:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

  <!-- //#2 STYLES -->
  <style>
    body.theme-neutral {
      font-family: 'Montserrat', sans-serif;
      background: radial-gradient(circle at right, #7b5e3d, #000000);
      color: #f5f5f5;
    }
    body.theme-tease {
      font-family: 'Montserrat', sans-serif;
      background: radial-gradient(circle at right, #7b5e3d, #000000);
      color: #f5f5f5;
    }
    h1, h2, h3 {
      font-family: 'Lora', serif;
    }
    .glass {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
      transition: box-shadow 0.3s ease;
    }
    .glass:hover {
      box-shadow: 0 12px 48px rgba(0, 0, 0, 0.3);
    }
    .gold {
      --tw-bg-opacity: 1;
      background-color: rgba(212,175,55,var(--tw-bg-opacity));
    }
    .hero {
      position: relative;
      background-color: #252422;
      color: #fff;
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute;
      bottom: -50px;
      left: 50%;
      transform: translateX(-50%);
      width: 120%;
      height: 300px;
      background: radial-gradient(ellipse at center, rgba(212,175,55,0.35) 0%, rgba(0,0,0,0.1) 70%);
      opacity: 0.9;
      z-index: 0;
    }
    .hero > div {
      position: relative;
      z-index: 10;
    }
    .swiper-slide img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .rotator {
      perspective: 1000px;
    }
    .rotator img {
      width: 100%;
      height: auto;
      transform-style: preserve-3d;
      animation: spin 20s linear infinite;
    }
    @keyframes spin {
      from { transform: rotateY(0deg) rotateX(0deg); }
      to   { transform: rotateY(360deg) rotateX(360deg); }
    }
  </style>
</head>

<body class="theme-neutral">
  <!-- //#3 HEADER/NAV -->
  <header class="w-full py-4 fixed z-50 glass">
    <div class="max-w-7xl mx-auto px-6 flex justify-between items-center">
      <div class="flex items-center space-x-4">
        <h1 class="text-2xl font-bold text-white mr-auto">RealtySass</h1>
        <button id="teaseToggle" class="px-3 py-1 border border-gray-500 rounded-full text-xs text-white">Tease Mode: Off</button>
      </div>
      <nav class="hidden md:flex space-x-6">
        <a href="products.html" class="text-gray-200 hover:text-gold">Products</a>
        <a href="templates.html" class="text-gray-200 hover:text-gold">Templates</a>
        <a href="pricing.html" class="text-gray-200 hover:text-gold">Pricing</a>
        <a href="login.html" class="text-gray-200 hover:text-gold">Login</a>
        <a href="RealtySass.html" class="text-gray-200 hover:text-gold">Tease Mode</a>
        <a href="joinus.html" class="px-4 py-2 gold text-gray-900 rounded-full hover:opacity-90">Join Us</a>
      </nav>
    </div>
  </header>

  <!-- //#4 HERO SECTION -->
  <section class="hero text-center pt-36 pb-20 px-4">
    <div class="max-w-4xl mx-auto">
      <h2 id="heroHeading" class="text-4xl md:text-5xl font-bold mb-4 leading-tight">
        Put some SaaS in your Realty—Let's do it A.I. Style!
      </h2>
      <p id="heroDesc" class="text-gray-300 text-lg mb-8">
        Enhance your Sass. Show off your listings. Get more Hot Sales.
      </p>
    </div>
  </section>

  <!-- //#5 HERO VIDEO SECTION -->
  <section class="flex justify-start items-center bg-black pb-0 px-0">
    <video id="heroVideo" class="max-w-xs h-auto" autoplay controls playsinline>
      <source src="introvideo.mp4" type="video/mp4" />
      Your browser does not support the video tag.
    </video>
  </section>

  <!-- //#6 LUXURYPRESENCE STYLE GRID -->
  <section class="bg-[#f7f7f7] py-20 px-4 text-gray-800">
    <div class="max-w-7xl mx-auto">
      <div class="grid md:grid-cols-3 gap-8">
        <!-- Keep your three boxes exactly as-is here -->
      </div>
    </div>
  </section>

  <!-- //#7 CHOOSE YOUR VIBE -->
  <section id="vibe" class="py-20 px-4">
    <div class="max-w-6xl mx-auto text-center mb-10">
      <h3 class="text-3xl font-bold">Choose Your SaaS</h3>
      <p class="text-gray-400 mt-2">Your real estate identity starts here. Pick your platform:</p>
    </div>
    <div class="grid md:grid-cols-3 gap-8 px-6">
      <!-- Keep your glass blocks exactly as-is here -->
    </div>
  </section>

  <!-- //#8 ROTATOR PHOTO SECTION -->
  <section class="py-20 px-4 text-center">
    <h3 class="text-3xl font-bold mb-6">Experience Every Angle</h3>
    <div class="rotator max-w-6xl mx-auto">
      <img src="SaSS.png" alt="360° Property View">
    </div>
  </section>

  <!-- //#9 FOOTER -->
  <footer class="bg-[#111] text-gray-400 pt-20 pb-10 px-6">
    <!-- Your entire footer stays identical -->
  </footer>

  <!-- //#10 REDEFINED OVERLAY -->
  <!-- + Flip Overlay, exact same -->

  <!-- //#11 SCRIPTS -->
  <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
  <script>
    const toggle = document.getElementById('teaseToggle');
    const body = document.body;
    const heroHeading = document.getElementById('heroHeading');
    const heroDesc = document.getElementById('heroDesc');

    toggle.addEventListener('click', () => {
      const isTease = body.classList.contains('theme-tease');
      body.classList.toggle('theme-tease', !isTease);
      body.classList.toggle('theme-neutral', isTease);
      toggle.textContent = isTease ? 'Tease Mode: Off' : 'Tease Mode: On';

      heroHeading.textContent = isTease
        ? "Put some SaaS in your Realty—Let's do it A.I. Style!"
        : "You like what you see... Go ahead Grab them";

      heroDesc.textContent = isTease
        ? "Enhance your Sass. Show off your listings. Get more Hot Sales."
        : "";
    });

    const heroVideo = document.getElementById('heroVideo');
    heroVideo.play().catch(() => {});
    document.addEventListener('click', () => {
      if (heroVideo.muted) {
        heroVideo.muted = false;
        heroVideo.play();
      }
    });
    function openRedefined() {
      document.getElementById('redefinedFrame').src = 'https://realredefined-1.onrender.com';
      document.getElementById('redefinedOverlay').classList.remove('hidden');
    }
    function closeRedefined() {
      document.getElementById('redefinedOverlay').classList.add('hidden');
      document.getElementById('redefinedFrame').src = '';
    }
    function openFlip() {
      document.getElementById('flipFrame').src = 'https://flip-ai.netlify.app';
      document.getElementById('flipOverlay').classList.remove('hidden');
    }
    function closeFlip() {
      document.getElementById('flipOverlay').classList.add('hidden');
      document.getElementById('flipFrame').src = '';
    }
  </script>
</body>
</html>
